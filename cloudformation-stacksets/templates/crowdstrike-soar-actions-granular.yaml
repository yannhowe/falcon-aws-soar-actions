      PolicyName: CDR-SSM-GetTaskStatus
      Roles:
        - !Ref CrowdStrikeSOARRole
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: GetTaskStatus
            Effect: Allow
            Action:
              - 'ssm:GetAutomationExecution'
            Resource: '*'

  # ==========================================
  # CDR Automated Response - Lambda Policies
  # ==========================================

  CDRLambdaPutFunctionConcurrencyPolicy:
    Type: AWS::IAM::Policy
    Condition: EnableCDRLambdaPutFunctionConcurrencyPolicy
    Properties:
      PolicyName: CDR-Lambda-PutFunctionConcurrency
      Roles:
        - !Ref CrowdStrikeSOARRole
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: PutFunctionConcurrency
            Effect: Allow
            Action:
              - 'lambda:PutFunctionConcurrency'
            Resource: !Sub 'arn:${AWS::Partition}:lambda:*:${AWS::AccountId}:function/*'

  # ==========================================
  # CDR Automated Response - S3 Policies
  # ==========================================

  CDRS3DeleteBucketReplicationPolicy:
    Type: AWS::IAM::Policy
    Condition: EnableCDRS3DeleteBucketReplicationPolicy
    Properties:
      PolicyName: CDR-S3-DeleteBucketReplication
      Roles:
        - !Ref CrowdStrikeSOARRole
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: DeleteBucketReplication
            Effect: Allow
            Action:
              - 's3:PutReplicationConfiguration'
            Resource: !Sub 'arn:${AWS::Partition}:s3:::*'

  CDRS3PutPublicAccessBlockPolicy:
    Type: AWS::IAM::Policy
    Condition: EnableCDRS3PutPublicAccessBlockPolicy
    Properties:
      PolicyName: CDR-S3-PutPublicAccessBlock
      Roles:
        - !Ref CrowdStrikeSOARRole
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: PutPublicAccessBlock
            Effect: Allow
            Action:
              - 's3:PutBucketPublicAccessBlock'
              - 's3:PutAccountPublicAccessBlock'
            Resource:
              - !Sub 'arn:${AWS::Partition}:s3:::*'
              - '*'

  # ==========================================
  # CDR Automated Response - EFS Policies
  # ==========================================

  CDREFSRemovePublicAccessPolicy:
    Type: AWS::IAM::Policy
    Condition: EnableCDREFSRemovePublicAccessPolicy
    Properties:
      PolicyName: CDR-EFS-RemovePublicAccess
      Roles:
        - !Ref CrowdStrikeSOARRole
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: RemovePublicAccess
            Effect: Allow
            Action:
              - 'elasticfilesystem:DescribeFileSystemPolicy'
              - 'elasticfilesystem:DeleteFileSystemPolicy'
              - 'elasticfilesystem:PutFileSystemPolicy'
            Resource: !Sub 'arn:${AWS::Partition}:elasticfilesystem:*:${AWS::AccountId}:file-system/*'

  # ==========================================
  # Store Plugin - EC2 Policies
  # ==========================================

  EC2InstanceManagementPolicy:
    Type: AWS::IAM::Policy
    Condition: EnableEC2InstanceManagementPolicy
    Properties:
      PolicyName: Store-EC2-InstanceManagement
      Roles:
        - !Ref CrowdStrikeSOARRole
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: InstanceManagement
            Effect: Allow
            Action:
              - 'ec2:DescribeInstances'
              - 'ec2:DescribeInstanceStatus'
              - 'ec2:DescribeInstanceAttribute'
              - 'ec2:StartInstances'
              - 'ec2:StopInstances'
              - 'ec2:RebootInstances'
              - 'ec2:TerminateInstances'
              - 'ec2:ModifyInstanceAttribute'
            Resource: '*'

  EC2SecurityGroupManagementPolicy:
    Type: AWS::IAM::Policy
    Condition: EnableEC2SecurityGroupManagementPolicy
    Properties:
      PolicyName: Store-EC2-SecurityGroupManagement
      Roles:
        - !Ref CrowdStrikeSOARRole
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: SecurityGroupManagement
            Effect: Allow
            Action:
              - 'ec2:DescribeSecurityGroups'
              - 'ec2:DescribeSecurityGroupRules'
              - 'ec2:CreateSecurityGroup'
              - 'ec2:AuthorizeSecurityGroupIngress'
              - 'ec2:AuthorizeSecurityGroupEgress'
              - 'ec2:RevokeSecurityGroupIngress'
              - 'ec2:RevokeSecurityGroupEgress'
              - 'ec2:ModifySecurityGroupRules'
              - 'ec2:DeleteSecurityGroup'
            Resource: '*'

  EC2NetworkInterfaceManagementPolicy:
    Type: AWS::IAM::Policy
    Condition: EnableEC2NetworkInterfaceManagementPolicy
    Properties:
      PolicyName: Store-EC2-NetworkInterfaceManagement
      Roles:
        - !Ref CrowdStrikeSOARRole
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: NetworkInterfaceManagement
            Effect: Allow
            Action:
              - 'ec2:DescribeNetworkInterfaces'
              - 'ec2:ModifyNetworkInterfaceAttribute'
              - 'ec2:CreateNetworkInterface'
              - 'ec2:DeleteNetworkInterface'
              - 'ec2:AttachNetworkInterface'
              - 'ec2:DetachNetworkInterface'
            Resource: '*'

  EC2VolumeManagementPolicy:
    Type: AWS::IAM::Policy
    Condition: EnableEC2VolumeManagementPolicy
    Properties:
      PolicyName: Store-EC2-VolumeManagement
      Roles:
        - !Ref CrowdStrikeSOARRole
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: VolumeManagement
            Effect: Allow
            Action:
              - 'ec2:DescribeVolumes'
              - 'ec2:CreateSnapshot'
              - 'ec2:DescribeSnapshots'
              - 'ec2:DeleteSnapshot'
              - 'ec2:CreateVolume'
              - 'ec2:DeleteVolume'
              - 'ec2:AttachVolume'
              - 'ec2:DetachVolume'
            Resource: '*'

Outputs:
  # Core Configuration Values
  RoleArn:
    Description: 'ARN of the CrowdStrike SOAR IAM role (copy this to CrowdStrike Store)'
    Value: !GetAtt CrowdStrikeSOARRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-RoleArn'

  RoleName:
    Description: 'IAM Role Name (for reference only)'
    Value: !Ref CrowdStrikeSOARRole
    Export:
      Name: !Sub '${AWS::StackName}-RoleName'

  AccountId:
    Description: 'AWS Account ID (copy this to CrowdStrike Store)'
    Value: !Ref AWS::AccountId

  ExternalIdReminder:
    Description: 'External ID (use the same value you provided during stack creation)'
    Value: 'Use the External ID parameter value from stack creation'

  ConfigurationName:
    Description: 'Suggested Configuration Name for CrowdStrike Store'
    Value: !Sub '${AWS::AccountId}-soar'

  # CrowdStrike Store Plugin Links
