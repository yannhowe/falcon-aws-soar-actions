  # Step-by-Step Instructions
  SetupInstructions:
    Description: 'Complete setup instructions'
    Value: !Sub |
      ╔═══════════════════════════════════════════════════════════════════╗
      ║              CrowdStrike SOAR Setup Instructions                  ║
      ╚═══════════════════════════════════════════════════════════════════╝

      ✅ CLOUDFORMATION DEPLOYMENT: COMPLETE

      The IAM role has been created with granular action-level permissions.

      ───────────────────────────────────────────────────────────────────

      📌 NEXT STEPS - Configure Store Plugins:

      FOR CDR AUTOMATED RESPONSE (Detection-Driven):
      ✓ No Store configuration needed!
      ✓ CDR will automatically use this role when detections fire
      ✓ Actions: Update Access Keys, Apply Deny Policies, Stop Instances, etc.

      FOR STORE PLUGINS (Manual/Workflow SOAR):

      1️⃣  Log into Falcon Console
         https://falcon.crowdstrike.com/

      2️⃣  Navigate to CrowdStrike Store
         Go to: CrowdStrike Store > All apps

      3️⃣  Configure Each Enabled Plugin:

         For AWS IAM SOAR Actions:
         ├─ Link: https://falcon.crowdstrike.com/store/apps/details/aws-iam-soar-actions
         ├─ Click "Configure" button
         ├─ Click "Add configuration"
         └─ Enter values (see ConfigurationValues output above)

         For AWS EC2 SOAR Actions:
         ├─ Link: https://falcon.crowdstrike.com/store/apps/details/aws-ec2-soar-actions
         ├─ Click "Configure" button
         ├─ Click "Add configuration"
         └─ Enter values (see ConfigurationValues output above)

         Repeat for each AWS service you enabled (S3, Lambda, GuardDuty, etc.)

      4️⃣  Test Configuration:
         ├─ In CrowdStrike Falcon, create a test Fusion workflow
         ├─ Add an AWS action (e.g., "AWS IAM - Get User")
         ├─ Select your configuration: ${AWS::AccountId}-soar
         └─ Run the workflow to verify connectivity

      5️⃣  Monitor Usage:
         Check AWS CloudTrail for role assumption events:
         aws cloudtrail lookup-events --lookup-attributes AttributeKey=ResourceName,AttributeValue=${AutomatedResponseRoleName}

      ───────────────────────────────────────────────────────────────────

      📊 ENABLED ACTIONS SUMMARY:

      CDR Automated Response (Enabled by Default):
      Review CloudFormation parameters for list of enabled CDR actions.

      Store Plugin Actions:
      Review CloudFormation parameters for full list of enabled actions.

      ───────────────────────────────────────────────────────────────────

      ⚠️  SECURITY NOTES:

      • This role uses External ID for secure authentication
      • All actions are logged to AWS CloudTrail
      • Role has 12-hour maximum session duration
      • Only enabled actions have IAM permissions granted
      • Review IAM policies in AWS Console for audit purposes

      ───────────────────────────────────────────────────────────────────

      📚 DOCUMENTATION:

      CrowdStrike Fusion SOAR:
      https://falcon.crowdstrike.com/documentation/page/fusion-soar

      AWS SOAR Actions:
      https://falcon.crowdstrike.com/documentation/page/cloud-security/soar-actions

      CloudFormation Stack:
      https://console.aws.amazon.com/cloudformation/home?region=${AWS::Region}#/stacks/stackinfo?stackId=${AWS::StackId}

      ═══════════════════════════════════════════════════════════════════

  # Region-Specific Store Link
  FalconConsoleLink:
    Description: 'Direct link to your Falcon console (region-specific)'
    Value: !Sub |
      US-1: https://falcon.crowdstrike.com/store
      US-2: https://falcon.us-2.crowdstrike.com/store
      EU-1: https://falcon.eu-1.crowdstrike.com/store
      GOV-1: https://falcon.laggar.gcw.crowdstrike.com/store

  # CloudTrail Verification Command
  VerificationCommand:
    Description: 'AWS CLI command to verify role usage in CloudTrail'
    Value: !Sub |
      # Verify role assumptions from CrowdStrike:
      aws cloudtrail lookup-events \
        --lookup-attributes AttributeKey=ResourceName,AttributeValue=${AutomatedResponseRoleName} \
        --max-items 10 \
        --region ${AWS::Region}

      # Check IAM role details:
      aws iam get-role --role-name ${AutomatedResponseRoleName}

      # List attached policies:
      aws iam list-attached-role-policies --role-name ${AutomatedResponseRoleName}
      aws iam list-role-policies --role-name ${AutomatedResponseRoleName}

  # Support Information
  SupportInfo:
    Description: 'Support and troubleshooting resources'
    Value: |
      ╔═══════════════════════════════════════════════════════════════════╗
      ║                    Support & Troubleshooting                      ║
      ╚═══════════════════════════════════════════════════════════════════╝

      🔧 COMMON ISSUES:

      "Access Denied" errors in Fusion workflows:
      → Verify the action is enabled in CloudFormation parameters
      → Check IAM policies are attached to the role
      → Review CloudTrail logs for specific denied API calls

      "Invalid External ID" error:
      → Ensure External ID in Store matches CloudFormation parameter
      → External ID is case-sensitive
      → Cannot use same External ID across different integrations

      "AssumeRole Failed" error:
      → Verify Intermediate Role ARN is correct for your region
      → Check trust policy on IAM role allows CrowdStrike principal
      → Ensure External ID condition is properly configured

      ───────────────────────────────────────────────────────────────────

