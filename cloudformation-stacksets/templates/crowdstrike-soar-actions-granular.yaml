AWSTemplateFormatVersion: '2010-09-09'
Description: 'CrowdStrike SOAR Actions - Granular action-level permissions'

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: 'CrowdStrike Configuration'
        Parameters:
          - ExternalId
          - CrowdStrikeRoleArn
          - AutomatedResponseRoleName
          - PermissionsBoundaryArn

      - Label:
          default: 'CDR Automated Response - IAM Actions'
        Parameters:
          - EnableCDRUpdateAccessKeyStatus
          - EnableCDRApplyDenyPolicyToUser
          - EnableCDRApplyDenyPolicyToRole
          - EnableCDRGetInstanceProfileRole
          - EnableCDRIAMRoleValidator
          - EnableCDRIAMExtractInstanceID

      - Label:
          default: 'Store Plugin - IAM User Lifecycle Management'
        Parameters:
          - EnableIAMGetUser
          - EnableIAMListUsers
          - EnableIAMCreateUser
          - EnableIAMDeleteUser
          - EnableIAMUpdateUser
          - EnableIAMCreateGroup
          - EnableIAMDeleteGroup
          - EnableIAMAddUserToGroup
          - EnableIAMRemoveUserFromGroup

      - Label:
          default: 'Store Plugin - IAM Access Key & Credential Rotation'
        Parameters:
          - EnableIAMListAccessKeys
          - EnableIAMCreateAccessKey
          - EnableIAMDeleteAccessKey
          - EnableIAMUpdateAccessKey
          - EnableIAMGetAccessKeyLastUsed
          - EnableIAMMFAManagement
          - EnableIAMSSHKeyManagement
          - EnableIAMServiceCredentialManagement

      - Label:
          default: 'Store Plugin - IAM Policy & Permission Administration'
        Parameters:
          - EnableIAMGetPolicy
          - EnableIAMListPolicies
          - EnableIAMCreatePolicy
          - EnableIAMDeletePolicy
          - EnableIAMAttachUserPolicy
          - EnableIAMDetachUserPolicy
          - EnableIAMPutUserPolicy
          - EnableIAMDeleteUserPolicy
          - EnableIAMPermissionBoundary

      - Label:
          default: 'Store Plugin - IAM Role & Instance Profile Management'
        Parameters:
          - EnableIAMGetRole
          - EnableIAMListRoles
          - EnableIAMCreateRole
          - EnableIAMDeleteRole
          - EnableIAMUpdateAssumeRolePolicy
          - EnableIAMAttachRolePolicy
          - EnableIAMDetachRolePolicy
          - EnableIAMPutRolePolicy
          - EnableIAMDeleteRolePolicy
          - EnableIAMInstanceProfileManagement

      - Label:
          default: 'Store Plugin - IAM Security Audit & Compliance'
        Parameters:
          - EnableIAMGetAccountSummary
          - EnableIAMGetAccountPasswordPolicy
          - EnableIAMCredentialReport
          - EnableIAMServiceLastAccessed

      - Label:
          default: 'Store Plugin - IAM Federated Identity'
        Parameters:
          - EnableIAMSAMLProvider
          - EnableIAMOIDCProvider

      - Label:
          default: 'Store Plugin - IAM Password & Authentication'
        Parameters:
          - EnableIAMLoginProfile
          - EnableIAMPasswordPolicy

      - Label:
          default: 'CDR Automated Response - EC2 Actions'
        Parameters:
          - EnableCDREC2GetInstanceState
          - EnableCDREC2StopInstance
          - EnableCDREC2FindInstancesByIP
          - EnableCDREC2DeleteNATGateway
          - EnableCDREC2FindNATGatewaysByIP
          - EnableCDREC2MakeSnapshotPrivate
          - EnableCDREC2ModifySecurityGroupIngress

      - Label:
          default: 'CDR Automated Response - SSM Actions'
        Parameters:
          - EnableCDRSSMInstallFalconAgent
          - EnableCDRSSMGetTaskStatus

      - Label:
          default: 'CDR Automated Response - Lambda Actions'
        Parameters:
          - EnableCDRLambdaPutFunctionConcurrency

      - Label:
          default: 'CDR Automated Response - S3 Actions'
        Parameters:
          - EnableCDRS3DeleteBucketReplication
          - EnableCDRS3PutPublicAccessBlock

      - Label:
          default: 'CDR Automated Response - EFS Actions'
        Parameters:
          - EnableCDREFSRemovePublicAccess

      - Label:
          default: 'Store Plugin - EC2 Actions'
        Parameters:
          - EnableEC2InstanceManagement
          - EnableEC2SecurityGroupManagement
          - EnableEC2NetworkInterfaceManagement
          - EnableEC2VolumeManagement

Parameters:
  ExternalId:
    Type: String
    Description: 'External ID for role assumption (obtained from CrowdStrike Falcon console)'
    MinLength: 1
    NoEcho: true

  CrowdStrikeRoleArn:
    Type: String
    Description: 'CrowdStrike Role ARN that will assume the automated response role (region-specific, see docs)'
    AllowedPattern: '^arn:aws[a-z-]*:iam::\d{12}:role/.+$'

  AutomatedResponseRoleName:
    Type: String
    Description: 'Name of the automated response role that will be created'
    Default: 'CrowdStrikeAutomatedResponse'
    AllowedPattern: '^[a-zA-Z0-9+=,.@_-]{1,64}$'

  PermissionsBoundaryArn:
    Type: String
    Description: 'Optional: ARN of IAM permissions boundary policy'
    Default: ''
    AllowedPattern: '^(arn:aws[a-z-]*:iam::\d{12}:policy/.+)?$'

  # ==========================================
  # CDR Automated Response - IAM Actions
  # ==========================================

  EnableCDRUpdateAccessKeyStatus:
    Type: String
    Description: 'CDR Action: Update Access Key Status (Disable compromised keys)'
    Default: 'true'
    AllowedValues: ['true', 'false']

  EnableCDRApplyDenyPolicyToUser:
    Type: String
    Description: 'CDR Action: Apply Deny Policy to User (Contain compromised user)'
    Default: 'true'
    AllowedValues: ['true', 'false']

  EnableCDRApplyDenyPolicyToRole:
    Type: String
    Description: 'CDR Action: Apply Deny Policy to Role (Contain compromised EC2 instance)'
    Default: 'true'
    AllowedValues: ['true', 'false']

  EnableCDRGetInstanceProfileRole:
    Type: String
    Description: 'CDR Action: Get Instance Profile Role (Investigate EC2 role)'
    Default: 'true'
    AllowedValues: ['true', 'false']

  EnableCDRIAMRoleValidator:
    Type: String
    Description: 'Enable CDR IAM Role Validator action (validates if IAM role is approved or AWS service role)'
    Default: 'true'
    AllowedValues: ['true', 'false']

  EnableCDRIAMExtractInstanceID:
    Type: String
    Description: 'Enable CDR IAM Extract Instance ID action (extracts EC2 instance ID from CloudTrail principal)'
    Default: 'true'
    AllowedValues: ['true', 'false']

  # ==========================================
  # Store Plugin - User Lifecycle
  # ==========================================

  EnableIAMGetUser:
    Type: String
    Description: 'Get IAM user details for investigation'
    Default: 'false'
    AllowedValues: ['true', 'false']

  EnableIAMListUsers:
    Type: String
    Description: 'List all IAM users'
    Default: 'false'
    AllowedValues: ['true', 'false']

  EnableIAMCreateUser:
    Type: String
    Description: 'Create new IAM users'
    Default: 'false'
    AllowedValues: ['true', 'false']

  EnableIAMDeleteUser:
    Type: String
    Description: 'Delete IAM users'
    Default: 'false'
    AllowedValues: ['true', 'false']

  EnableIAMUpdateUser:
    Type: String
    Description: 'Update IAM user properties'
    Default: 'false'
    AllowedValues: ['true', 'false']

  EnableIAMCreateGroup:
    Type: String
    Description: 'Create IAM groups'
    Default: 'false'
    AllowedValues: ['true', 'false']

  EnableIAMDeleteGroup:
    Type: String
    Description: 'Delete IAM groups'
    Default: 'false'
    AllowedValues: ['true', 'false']

  EnableIAMAddUserToGroup:
    Type: String
    Description: 'Add users to IAM groups'
    Default: 'false'
    AllowedValues: ['true', 'false']

  EnableIAMRemoveUserFromGroup:
    Type: String
    Description: 'Remove users from IAM groups'
    Default: 'false'
    AllowedValues: ['true', 'false']

  # ==========================================
  # Store Plugin - Access Keys
  # ==========================================

  EnableIAMListAccessKeys:
    Type: String
    Description: 'List user access keys'
    Default: 'false'
    AllowedValues: ['true', 'false']

  EnableIAMCreateAccessKey:
    Type: String
    Description: 'Create new access keys'
    Default: 'false'
    AllowedValues: ['true', 'false']

  EnableIAMDeleteAccessKey:
    Type: String
    Description: 'Delete access keys'
    Default: 'false'
    AllowedValues: ['true', 'false']

  EnableIAMUpdateAccessKey:
    Type: String
    Description: 'Update access key status (Active/Inactive)'
    Default: 'false'
    AllowedValues: ['true', 'false']

  EnableIAMGetAccessKeyLastUsed:
    Type: String
    Description: 'Get access key last used information'
    Default: 'false'
    AllowedValues: ['true', 'false']

  EnableIAMMFAManagement:
    Type: String
    Description: 'Enable MFA device management (create, enable, deactivate, delete)'
    Default: 'false'
    AllowedValues: ['true', 'false']

  EnableIAMSSHKeyManagement:
    Type: String
    Description: 'Enable SSH public key management'
    Default: 'false'
    AllowedValues: ['true', 'false']

  EnableIAMServiceCredentialManagement:
    Type: String
    Description: 'Enable service-specific credential management'
    Default: 'false'
    AllowedValues: ['true', 'false']

  # ==========================================
  # Store Plugin - Policy Management
  # ==========================================

  EnableIAMGetPolicy:
    Type: String
    Description: 'Get policy details'
    Default: 'false'
    AllowedValues: ['true', 'false']

  EnableIAMListPolicies:
    Type: String
    Description: 'List IAM policies'
    Default: 'false'
    AllowedValues: ['true', 'false']

  EnableIAMCreatePolicy:
    Type: String
    Description: 'Create IAM policies'
    Default: 'false'
    AllowedValues: ['true', 'false']

  EnableIAMDeletePolicy:
    Type: String
    Description: 'Delete IAM policies'
    Default: 'false'
    AllowedValues: ['true', 'false']

  EnableIAMAttachUserPolicy:
    Type: String
    Description: 'Attach managed policies to users'
    Default: 'false'
    AllowedValues: ['true', 'false']

  EnableIAMDetachUserPolicy:
    Type: String
    Description: 'Detach managed policies from users'
    Default: 'false'
    AllowedValues: ['true', 'false']

  EnableIAMPutUserPolicy:
    Type: String
    Description: 'Create/update inline policies on users'
    Default: 'false'
    AllowedValues: ['true', 'false']

  EnableIAMDeleteUserPolicy:
    Type: String
    Description: 'Delete inline policies from users'
    Default: 'false'
    AllowedValues: ['true', 'false']

  EnableIAMPermissionBoundary:
    Type: String
    Description: 'Manage IAM permission boundaries'
    Default: 'false'
    AllowedValues: ['true', 'false']

  # ==========================================
  # Store Plugin - Role Management
  # ==========================================

  EnableIAMGetRole:
    Type: String
    Description: 'Get role details'
    Default: 'false'
    AllowedValues: ['true', 'false']

  EnableIAMListRoles:
    Type: String
    Description: 'List IAM roles'
    Default: 'false'
    AllowedValues: ['true', 'false']

  EnableIAMCreateRole:
    Type: String
    Description: 'Create IAM roles'
    Default: 'false'
    AllowedValues: ['true', 'false']

  EnableIAMDeleteRole:
    Type: String
    Description: 'Delete IAM roles'
    Default: 'false'
    AllowedValues: ['true', 'false']

  EnableIAMUpdateAssumeRolePolicy:
    Type: String
    Description: 'Update role trust policies'
    Default: 'false'
    AllowedValues: ['true', 'false']

  EnableIAMAttachRolePolicy:
    Type: String
    Description: 'Attach managed policies to roles'
    Default: 'false'
    AllowedValues: ['true', 'false']

  EnableIAMDetachRolePolicy:
    Type: String
    Description: 'Detach managed policies from roles'
    Default: 'false'
    AllowedValues: ['true', 'false']

  EnableIAMPutRolePolicy:
    Type: String
    Description: 'Create/update inline policies on roles'
    Default: 'false'
    AllowedValues: ['true', 'false']

  EnableIAMDeleteRolePolicy:
    Type: String
    Description: 'Delete inline policies from roles'
    Default: 'false'
    AllowedValues: ['true', 'false']

  EnableIAMInstanceProfileManagement:
    Type: String
    Description: 'Manage EC2 instance profiles (get, create, delete, add/remove roles)'
    Default: 'false'
    AllowedValues: ['true', 'false']

  # ==========================================
  # Store Plugin - Security Audit
  # ==========================================

  EnableIAMGetAccountSummary:
    Type: String
    Description: 'Get account summary for compliance reporting'
    Default: 'false'
    AllowedValues: ['true', 'false']

  EnableIAMGetAccountPasswordPolicy:
    Type: String
    Description: 'Get account password policy'
    Default: 'false'
    AllowedValues: ['true', 'false']

  EnableIAMCredentialReport:
    Type: String
    Description: 'Generate and retrieve credential reports'
    Default: 'false'
    AllowedValues: ['true', 'false']

  EnableIAMServiceLastAccessed:
    Type: String
    Description: 'Get service last accessed details for audit'
    Default: 'false'
    AllowedValues: ['true', 'false']

  # ==========================================
  # Store Plugin - Federated Identity
  # ==========================================

  EnableIAMSAMLProvider:
    Type: String
    Description: 'Manage SAML identity providers (create, update, delete, list, get)'
    Default: 'false'
    AllowedValues: ['true', 'false']

  EnableIAMOIDCProvider:
    Type: String
    Description: 'Manage OpenID Connect providers (create, update, delete, list, get)'
    Default: 'false'
    AllowedValues: ['true', 'false']

  # ==========================================
  # Store Plugin - Password & Authentication
  # ==========================================

  EnableIAMLoginProfile:
    Type: String
    Description: 'Manage console login profiles (create, update, delete, get)'
    Default: 'false'
    AllowedValues: ['true', 'false']

  EnableIAMPasswordPolicy:
    Type: String
    Description: 'Update/delete account password policies'
    Default: 'false'
    AllowedValues: ['true', 'false']

  # ==========================================
  # CDR Automated Response - EC2 Actions
  # ==========================================

  EnableCDREC2GetInstanceState:
    Type: String
    Description: 'CDR Action: Get EC2 Instance State'
    Default: 'true'
    AllowedValues: ['true', 'false']

  EnableCDREC2StopInstance:
    Type: String
    Description: 'CDR Action: Stop EC2 Instance (Contain compromised instance)'
    Default: 'true'
    AllowedValues: ['true', 'false']

  EnableCDREC2FindInstancesByIP:
    Type: String
    Description: 'CDR Action: Find EC2 Instances by IP Address'
    Default: 'true'
    AllowedValues: ['true', 'false']

  EnableCDREC2DeleteNATGateway:
    Type: String
    Description: 'CDR Action: Delete NAT Gateway (Cut off internet access)'
    Default: 'false'
    AllowedValues: ['true', 'false']

  EnableCDREC2FindNATGatewaysByIP:
    Type: String
    Description: 'Enable CDR EC2 Find NAT Gateways by IP action'
    Default: 'true'
    AllowedValues: ['true', 'false']

  EnableCDREC2MakeSnapshotPrivate:
    Type: String
    Description: 'CDR Action: Make Snapshot Private (Prevent data exfiltration)'
    Default: 'false'
    AllowedValues: ['true', 'false']

  EnableCDREC2ModifySecurityGroupIngress:
    Type: String
    Description: 'CDR Action: Modify Security Group Ingress (Block malicious IPs)'
    Default: 'false'
    AllowedValues: ['true', 'false']

  # ==========================================
  # CDR Automated Response - SSM Actions
  # ==========================================

  EnableCDRSSMInstallFalconAgent:
    Type: String
    Description: 'Enable CDR SSM Install Falcon Agent action'
    Default: 'true'
    AllowedValues: ['true', 'false']

  EnableCDRSSMGetTaskStatus:
    Type: String
    Description: 'Enable CDR SSM Get Task Status action'
    Default: 'true'
    AllowedValues: ['true', 'false']

  # ==========================================
  # CDR Automated Response - Lambda Actions
  # ==========================================

  EnableCDRLambdaPutFunctionConcurrency:
    Type: String
    Description: 'Enable CDR Lambda Put Function Concurrency action'
    Default: 'true'
    AllowedValues: ['true', 'false']

  # ==========================================
  # CDR Automated Response - S3 Actions
  # ==========================================

  EnableCDRS3DeleteBucketReplication:
    Type: String
    Description: 'Enable CDR S3 Delete Bucket Replication action'
    Default: 'true'
    AllowedValues: ['true', 'false']

  EnableCDRS3PutPublicAccessBlock:
    Type: String
    Description: 'Enable CDR S3 Put Public Access Block action'
    Default: 'true'
    AllowedValues: ['true', 'false']

  # ==========================================
  # CDR Automated Response - EFS Actions
  # ==========================================

  EnableCDREFSRemovePublicAccess:
    Type: String
    Description: 'Enable CDR EFS Remove Public Access action'
    Default: 'true'
    AllowedValues: ['true', 'false']

  # ==========================================
  # Store Plugin - EC2 Actions
  # ==========================================

  EnableEC2InstanceManagement:
    Type: String
    Description: 'EC2 instance operations (describe, start, stop, reboot, terminate, modify)'
    Default: 'false'
    AllowedValues: ['true', 'false']

  EnableEC2SecurityGroupManagement:
    Type: String
    Description: 'Security group management (create, modify, authorize, revoke rules)'
    Default: 'false'
    AllowedValues: ['true', 'false']

  EnableEC2NetworkInterfaceManagement:
    Type: String
    Description: 'Network interface operations (describe, modify attributes)'
    Default: 'false'
    AllowedValues: ['true', 'false']

  EnableEC2VolumeManagement:
    Type: String
    Description: 'EBS volume and snapshot operations'
    Default: 'false'
    AllowedValues: ['true', 'false']

Conditions:
  HasPermissionsBoundary: !Not [!Equals [!Ref PermissionsBoundaryArn, '']]

  # CDR IAM Conditions
  EnableCDRUpdateAccessKeyStatusPolicy: !Equals [!Ref EnableCDRUpdateAccessKeyStatus, 'true']
  EnableCDRApplyDenyPolicyToUserPolicy: !Equals [!Ref EnableCDRApplyDenyPolicyToUser, 'true']
  EnableCDRApplyDenyPolicyToRolePolicy: !Equals [!Ref EnableCDRApplyDenyPolicyToRole, 'true']
  EnableCDRGetInstanceProfileRolePolicy: !Equals [!Ref EnableCDRGetInstanceProfileRole, 'true']

  # Store Plugin IAM Conditions
  EnableIAMGetUserPolicy: !Equals [!Ref EnableIAMGetUser, 'true']
  EnableIAMListUsersPolicy: !Equals [!Ref EnableIAMListUsers, 'true']
  EnableIAMCreateUserPolicy: !Equals [!Ref EnableIAMCreateUser, 'true']
  EnableIAMDeleteUserPolicy: !Equals [!Ref EnableIAMDeleteUser, 'true']
  EnableIAMUpdateUserPolicy: !Equals [!Ref EnableIAMUpdateUser, 'true']
  EnableIAMCreateGroupPolicy: !Equals [!Ref EnableIAMCreateGroup, 'true']
  EnableIAMDeleteGroupPolicy: !Equals [!Ref EnableIAMDeleteGroup, 'true']
  EnableIAMAddUserToGroupPolicy: !Equals [!Ref EnableIAMAddUserToGroup, 'true']
  EnableIAMRemoveUserFromGroupPolicy: !Equals [!Ref EnableIAMRemoveUserFromGroup, 'true']

  EnableIAMListAccessKeysPolicy: !Equals [!Ref EnableIAMListAccessKeys, 'true']
  EnableIAMCreateAccessKeyPolicy: !Equals [!Ref EnableIAMCreateAccessKey, 'true']
  EnableIAMDeleteAccessKeyPolicy: !Equals [!Ref EnableIAMDeleteAccessKey, 'true']
  EnableIAMUpdateAccessKeyPolicy: !Equals [!Ref EnableIAMUpdateAccessKey, 'true']
  EnableIAMGetAccessKeyLastUsedPolicy: !Equals [!Ref EnableIAMGetAccessKeyLastUsed, 'true']
  EnableIAMMFAManagementPolicy: !Equals [!Ref EnableIAMMFAManagement, 'true']
  EnableIAMSSHKeyManagementPolicy: !Equals [!Ref EnableIAMSSHKeyManagement, 'true']
  EnableIAMServiceCredentialManagementPolicy: !Equals [!Ref EnableIAMServiceCredentialManagement, 'true']

  EnableIAMGetPolicyPolicy: !Equals [!Ref EnableIAMGetPolicy, 'true']
  EnableIAMListPoliciesPolicy: !Equals [!Ref EnableIAMListPolicies, 'true']
  EnableIAMCreatePolicyPolicy: !Equals [!Ref EnableIAMCreatePolicy, 'true']
  EnableIAMDeletePolicyPolicy: !Equals [!Ref EnableIAMDeletePolicy, 'true']
  EnableIAMAttachUserPolicyPolicy: !Equals [!Ref EnableIAMAttachUserPolicy, 'true']
  EnableIAMDetachUserPolicyPolicy: !Equals [!Ref EnableIAMDetachUserPolicy, 'true']
  EnableIAMPutUserPolicyPolicy: !Equals [!Ref EnableIAMPutUserPolicy, 'true']
  EnableIAMDeleteUserPolicyPolicy: !Equals [!Ref EnableIAMDeleteUserPolicy, 'true']
  EnableIAMPermissionBoundaryPolicy: !Equals [!Ref EnableIAMPermissionBoundary, 'true']

  EnableIAMGetRolePolicy: !Equals [!Ref EnableIAMGetRole, 'true']
  EnableIAMListRolesPolicy: !Equals [!Ref EnableIAMListRoles, 'true']
  EnableIAMCreateRolePolicy: !Equals [!Ref EnableIAMCreateRole, 'true']
  EnableIAMDeleteRolePolicy: !Equals [!Ref EnableIAMDeleteRole, 'true']
  EnableIAMUpdateAssumeRolePolicyPolicy: !Equals [!Ref EnableIAMUpdateAssumeRolePolicy, 'true']
  EnableIAMAttachRolePolicyPolicy: !Equals [!Ref EnableIAMAttachRolePolicy, 'true']
  EnableIAMDetachRolePolicyPolicy: !Equals [!Ref EnableIAMDetachRolePolicy, 'true']
  EnableIAMPutRolePolicyPolicy: !Equals [!Ref EnableIAMPutRolePolicy, 'true']
  EnableIAMDeleteRolePolicyPolicy: !Equals [!Ref EnableIAMDeleteRolePolicy, 'true']
  EnableIAMInstanceProfileManagementPolicy: !Equals [!Ref EnableIAMInstanceProfileManagement, 'true']

  EnableIAMGetAccountSummaryPolicy: !Equals [!Ref EnableIAMGetAccountSummary, 'true']
  EnableIAMGetAccountPasswordPolicyPolicy: !Equals [!Ref EnableIAMGetAccountPasswordPolicy, 'true']
  EnableIAMCredentialReportPolicy: !Equals [!Ref EnableIAMCredentialReport, 'true']
  EnableIAMServiceLastAccessedPolicy: !Equals [!Ref EnableIAMServiceLastAccessed, 'true']

  EnableIAMSAMLProviderPolicy: !Equals [!Ref EnableIAMSAMLProvider, 'true']
  EnableIAMOIDCProviderPolicy: !Equals [!Ref EnableIAMOIDCProvider, 'true']

  EnableIAMLoginProfilePolicy: !Equals [!Ref EnableIAMLoginProfile, 'true']
  EnableIAMPasswordPolicyPolicy: !Equals [!Ref EnableIAMPasswordPolicy, 'true']

  # CDR EC2 Conditions
  EnableCDREC2GetInstanceStatePolicy: !Equals [!Ref EnableCDREC2GetInstanceState, 'true']
  EnableCDREC2StopInstancePolicy: !Equals [!Ref EnableCDREC2StopInstance, 'true']
  EnableCDREC2FindInstancesByIPPolicy: !Equals [!Ref EnableCDREC2FindInstancesByIP, 'true']
  EnableCDREC2DeleteNATGatewayPolicy: !Equals [!Ref EnableCDREC2DeleteNATGateway, 'true']
  EnableCDREC2FindNATGatewaysByIPPolicy: !Equals [!Ref EnableCDREC2FindNATGatewaysByIP, 'true']
  EnableCDREC2MakeSnapshotPrivatePolicy: !Equals [!Ref EnableCDREC2MakeSnapshotPrivate, 'true']
  EnableCDREC2ModifySecurityGroupIngressPolicy: !Equals [!Ref EnableCDREC2ModifySecurityGroupIngress, 'true']

  # CDR SSM Conditions
  EnableCDRSSMInstallFalconAgentPolicy: !Equals [!Ref EnableCDRSSMInstallFalconAgent, 'true']
  EnableCDRSSMGetTaskStatusPolicy: !Equals [!Ref EnableCDRSSMGetTaskStatus, 'true']

  # CDR Lambda Conditions
  EnableCDRLambdaPutFunctionConcurrencyPolicy: !Equals [!Ref EnableCDRLambdaPutFunctionConcurrency, 'true']

  # CDR S3 Conditions
  EnableCDRS3DeleteBucketReplicationPolicy: !Equals [!Ref EnableCDRS3DeleteBucketReplication, 'true']
  EnableCDRS3PutPublicAccessBlockPolicy: !Equals [!Ref EnableCDRS3PutPublicAccessBlock, 'true']

  # CDR EFS Conditions
  EnableCDREFSRemovePublicAccessPolicy: !Equals [!Ref EnableCDREFSRemovePublicAccess, 'true']

  # Store Plugin EC2 Conditions
  EnableEC2InstanceManagementPolicy: !Equals [!Ref EnableEC2InstanceManagement, 'true']
  EnableEC2SecurityGroupManagementPolicy: !Equals [!Ref EnableEC2SecurityGroupManagement, 'true']
  EnableEC2NetworkInterfaceManagementPolicy: !Equals [!Ref EnableEC2NetworkInterfaceManagement, 'true']
  EnableEC2VolumeManagementPolicy: !Equals [!Ref EnableEC2VolumeManagement, 'true']

Resources:
  CrowdStrikeSOARRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Ref AutomatedResponseRoleName
      Description: 'IAM role for CrowdStrike SOAR actions with granular permissions'
      MaxSessionDuration: 43200
      PermissionsBoundary: !If [HasPermissionsBoundary, !Ref PermissionsBoundaryArn, !Ref 'AWS::NoValue']
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Ref CrowdStrikeRoleArn
            Action: 'sts:AssumeRole'
            Condition:
              StringEquals:
                'sts:ExternalId': !Ref ExternalId
      Tags:
        - Key: CrowdStrikeManaged
          Value: 'true'
        - Key: Purpose
          Value: 'SOAR Actions'
        - Key: ManagedBy
          Value: 'CloudFormation'

  # ==========================================
  # CDR Automated Response - IAM Policies
  # ==========================================

  CDRUpdateAccessKeyStatusPolicy:
    Type: AWS::IAM::Policy
    Condition: EnableCDRUpdateAccessKeyStatusPolicy
    Properties:
      PolicyName: CDR-IAM-UpdateAccessKeyStatus
      Roles:
        - !Ref CrowdStrikeSOARRole
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: CDRUpdateAccessKeyStatus
            Effect: Allow
            Action:
              - 'iam:UpdateAccessKey'
            Resource: !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:user/*'

  CDRApplyDenyPolicyToUserPolicy:
    Type: AWS::IAM::Policy
    Condition: EnableCDRApplyDenyPolicyToUserPolicy
    Properties:
      PolicyName: CDR-IAM-ApplyDenyPolicyToUser
      Roles:
        - !Ref CrowdStrikeSOARRole
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: CDRApplyDenyPolicyToUser
            Effect: Allow
            Action:
              - 'iam:AttachUserPolicy'
            Resource: !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:user/*'

  CDRApplyDenyPolicyToRolePolicy:
    Type: AWS::IAM::Policy
    Condition: EnableCDRApplyDenyPolicyToRolePolicy
    Properties:
      PolicyName: CDR-IAM-ApplyDenyPolicyToRole
      Roles:
        - !Ref CrowdStrikeSOARRole
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: CDRApplyDenyPolicyToRole
            Effect: Allow
            Action:
              - 'iam:AttachRolePolicy'
            Resource: !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:role/*'

  CDRGetInstanceProfileRolePolicy:
    Type: AWS::IAM::Policy
    Condition: EnableCDRGetInstanceProfileRolePolicy
    Properties:
      PolicyName: CDR-IAM-GetInstanceProfileRole
      Roles:
        - !Ref CrowdStrikeSOARRole
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: CDRGetInstanceProfileRole
            Effect: Allow
            Action:
              - 'iam:GetInstanceProfile'
            Resource: !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:instance-profile/*'

  # ==========================================
  # Store Plugin - User Lifecycle Policies
  # ==========================================

  IAMGetUserPolicy:
    Type: AWS::IAM::Policy
    Condition: EnableIAMGetUserPolicy
    Properties:
      PolicyName: Store-IAM-GetUser
      Roles:
        - !Ref CrowdStrikeSOARRole
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: GetUser
            Effect: Allow
            Action:
              - 'iam:GetUser'
            Resource: !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:user/*'

